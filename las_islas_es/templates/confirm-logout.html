{% extends 'base.html' %}
{% load static %}
{% block content %}
<title>{% block title %}Confirm | Logout{% endblock %}</title>
<h2 class="color">Confirm Logout</h2>
<p>
    <a class="color-return" href="{% url 'index' %}">Return Home</a>
</p>
<form class="confirm-logout" method="post" action="{% url 'confirm-logout' %}">
    {% csrf_token %}
    <button id="clg" type="submit">Submit</button>
    <a class="color" href="{% url 'index' %}">Cancel</a>
</form>

{% endblock %}
