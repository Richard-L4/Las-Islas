{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Las Islas{% endblock %}</title>
    <script defer src="{% static 'JS/las-islas.js' %}"></script>
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}" />
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32x32.png' %}" />
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon-16x16.png' %}" />
    <link rel="manifest" href="{% static 'favicon/site.webmanifest' %}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="{% static 'CSS/las-islas-es.css' %}" />
</head>
<script defer src="{% static 'JS/las-islas.js' %}"></script>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="{% url 'index' %}">Caribbean</a>
        </div>

        <div class="nav-links" id="nav-links">
            <a href="{% url 'register' %}" class="{% if active_tab == 'register' %}active{% endif %}">Register</a>
            <a href="{% url 'admin:index' %}">Admin</a>
        </div>

        <div class="hamburger" id="hamburger">&#9776;</div>
    </nav>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show position-fixed top-50 start-50 translate-middle mt-3"
        role="alert" style="z-index: 1055">

        {{ message }}

        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}

    <main>
        {% block content %}
        <!-- Child templates will fill this area -->
        {% endblock %}
    </main>

    <footer>
        <p class="footer-text">&copy; 2025 Your Website Name</p>

        <div class="social-links">
            <a href="https://www.youtube.com" target="_blank" aria-label="YouTube">YouTube</a>
            <a href="https://www.linkedin.com" target="_blank" aria-label="LinkedIn">LinkedIn</a>
            <a href="https://www.instagram.com" target="_blank" aria-label="Instagram">Instagram</a>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
<script>
    const hamburger = document.getElementById("hamburger");
    const navLinks = document.getElementById("nav-links");

    hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("show");
    });
</script>

</html>
