{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}
<title>{% block title %}Las Islas | Register{% endblock %}</title>
<h1 class="color">The Register Page</h1>
<p>
    <a class="color-return" href="{% url 'index' %}">Return Home</a>
</p>

<div class="form-map-container">
    <section id="form">
        <form id="contact-form" method="post" action="{% url 'register' %}">
            {% csrf_token %}
            {{ form|crispy }}
            <p>Please enter your details</p>
            <button type="submit">Submit</button>
        </form>
    </section>
</div>
{% endblock %}
